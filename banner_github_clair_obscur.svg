<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bgGlow1" cx="20%" cy="20%" r="60%">
    <stop offset="0%" stop-color="#7A6C54" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#7A6C54" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="bgGlow2" cx="85%" cy="70%" r="55%">
    <stop offset="0%" stop-color="#5B6670" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#5B6670" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#A8966E" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#A8966E" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#E4DCC8"/>
    <stop offset="40%" stop-color="#A8784F"/>
    <stop offset="75%" stop-color="#5B6670"/>
    <stop offset="100%" stop-color="#8B5A54"/>
  </linearGradient>
</defs>

<rect width="1200" height="280" fill="#15171C"/>
<rect width="1200" height="280" fill="url(#bgGlow1)"/>
<rect width="1200" height="280" fill="url(#bgGlow2)"/>

<!-- subtle cracks -->
<g stroke="#3A3835" stroke-width="1" fill="none" opacity="0.5">
  <path d="M50,40 L90,70 L70,110 L120,140"/>
  <path d="M1100,30 L1060,80 L1090,130"/>
  <path d="M30,220 L80,200 L60,250"/>
  <path d="M1150,200 L1100,230 L1130,260"/>
</g>

<!-- expedition ring -->
<g transform="translate(960,140)">
  <circle r="95" fill="url(#ringGlow)"/>
  <circle r="78" fill="none" stroke="#3A3835" stroke-width="1.5"/>
  <circle r="68" fill="none" stroke="#C9C2B4" stroke-width="1" opacity="0.4"/>
  <circle r="60" fill="none" stroke="#A8966E" stroke-width="1" stroke-dasharray="1 6"/>
  <line x1="0" y1="-78" x2="0" y2="-66" stroke="#A8966E" stroke-width="1.2"/>
  <line x1="0" y1="78" x2="0" y2="66" stroke="#A8966E" stroke-width="1.2"/>
  <line x1="-78" y1="0" x2="-66" y2="0" stroke="#A8966E" stroke-width="1.2"/>
  <line x1="78" y1="0" x2="66" y2="0" stroke="#A8966E" stroke-width="1.2"/>
  <text x="0" y="18" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="500" fill="#E4DCC8" text-anchor="middle">33</text>
  <text x="0" y="42" font-family="'Courier New', monospace" font-size="8" letter-spacing="3" fill="#A8966E" text-anchor="middle">EXPÉDITION</text>
</g>

<!-- chapter tag -->
<text x="80" y="95" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="16" fill="#A8966E" letter-spacing="2">— capítulo I —</text>

<!-- main title with gradient -->
<text x="78" y="155" font-family="Georgia, 'Times New Roman', serif" font-weight="500" font-size="56" fill="url(#titleGrad)">Arthur Matos</text>

<!-- subtitle -->
<text x="80" y="190" font-family="'Courier New', monospace" font-size="14" fill="#8E8675">$ desenvolvedor frontend</text>
<text x="330" y="190" font-family="'Courier New', monospace" font-size="14" fill="#7FA88A">react</text>
<text x="385" y="190" font-family="'Courier New', monospace" font-size="14" fill="#8E8675">·</text>
<text x="398" y="190" font-family="'Courier New', monospace" font-size="14" fill="#7FA88A">supabase</text>

<!-- decorative divider line -->
<line x1="80" y1="215" x2="380" y2="215" stroke="#A8966E" stroke-width="1" opacity="0.4"/>
<text x="400" y="219" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#7A7468">em busca da próxima expedição</text>

</svg>
